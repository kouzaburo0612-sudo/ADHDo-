name: EAS Status

# EASサーバー側のビルド/提出状況を確認するための小さなワークフロー
on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: List recent builds
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build:list --platform ios --limit 3 --non-interactive --json
