name: BYME 2. EAS Status

# BYME のビルド/提出状況を確認する
# mainに置くが、対象は常に claude/app-dev-instructions-xpncjc ブランチ。
on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: byme
    steps:
      - name: Checkout (BYMEブランチを固定でチェックアウト)
        uses: actions/checkout@v4
        with:
          ref: claude/app-dev-instructions-xpncjc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: List recent builds
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build:list --platform ios --limit 3 --non-interactive --json

      - name: Check App Store Connect builds (TestFlight到着確認)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }
          fetch_chunks() {
            local name="$1" out="" i=0 raw val
            while [ $i -lt 30 ]; do
              raw=$(timeout 120 eas env:get --variable-name "${name}_${i}" --variable-environment production --format short --non-interactive </dev/null 2>/dev/null || true)
              val=$(printf '%s' "$raw" | strip_ansi | tr -d '\r' | sed -n "s/^${name}_${i}=//p" | tr -d '\n')
              [ -z "$val" ] && break
              out="${out}${val}"
              i=$((i+1))
            done
            printf '%s' "$out"
          }
          P8_B64=$(fetch_chunks BYME_ASCP8) || true
          KID=$(fetch_chunks BYME_ASCKID) || true
          ISS=$(fetch_chunks BYME_ASCISS) || true
          if [ -z "$P8_B64" ] || [ -z "$KID" ] || [ -z "$ISS" ]; then
            echo "::warning::ASCクレデンシャルがEAS保管庫にありません。スキップ"
            exit 0
          fi
          printf '%s' "$P8_B64" | base64 -d > /tmp/asc.p8
          echo "::add-mask::$KID"
          echo "::add-mask::$ISS"
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests 2>/dev/null \
            || python3 -m pip install --quiet pyjwt cryptography requests
          ASC_KEY_ID="$KID" ASC_ISSUER_ID="$ISS" python3 - <<'PYEOF'
          import os, time
          import jwt, requests

          KEY_ID = os.environ['ASC_KEY_ID'].strip()
          ISSUER = os.environ['ASC_ISSUER_ID'].strip()
          B = 'https://api.appstoreconnect.apple.com'
          key = open('/tmp/asc.p8').read()
          now = int(time.time())
          tok = jwt.encode({'iss': ISSUER, 'exp': now + 900, 'aud': 'appstoreconnect-v1', 'iat': now},
                           key, algorithm='ES256', headers={'kid': KEY_ID, 'typ': 'JWT'})
          H = {'Authorization': 'Bearer ' + tok}
          r = requests.get(B + '/v1/apps?filter[bundleId]=com.nash.byme', headers=H, timeout=60)
          apps = r.json().get('data', []) if r.status_code == 200 else []
          if not apps:
              print('app record not found')
              raise SystemExit(0)
          appid = apps[0]['id']
          r = requests.get(B + f'/v1/builds?filter[app]={appid}&sort=-uploadedDate&limit=5', headers=H, timeout=60)
          print('GET /v1/builds ->', r.status_code, flush=True)
          for b in r.json().get('data', []):
              a = b['attributes']
              print(f"ASC build: version={a.get('version')} state={a.get('processingState')} uploaded={a.get('uploadedDate')}", flush=True)
          if not r.json().get('data'):
              print('ASC builds: (まだ到着していません)', flush=True)
          PYEOF
