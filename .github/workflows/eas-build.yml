name: EAS Build & TestFlight

# 手動実行専用: Actionsタブ or APIから起動すると、
# EASでiOS本番ビルド → 完了後そのままTestFlightへ自動提出する
on:
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Restore App Store Connect API key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: printf '%s\n' "$ASC_API_KEY" > ./asc_api_key.p8

      - name: Build on EAS and auto-submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive --auto-submit
