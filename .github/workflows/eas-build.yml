name: EAS Build & TestFlight

# 手動実行専用: Actionsタブ or APIから起動すると、
# EASでiOS本番ビルド → 完了後そのままTestFlightへ自動提出する
on:
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Restore App Store Connect API key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: printf '%s\n' "$ASC_API_KEY" > ./asc_api_key.p8

      - name: Build on EAS and auto-submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # App Store Connect APIキーでApple認証(新ターゲットの署名プロファイルを自動作成できるように)
          EXPO_ASC_API_KEY_PATH: ./asc_api_key.p8
          EXPO_ASC_KEY_ID: 6SG3K4BN9L
          EXPO_ASC_ISSUER_ID: d14dbdb1-1931-46b6-881a-94cc160cb823
          EXPO_APPLE_TEAM_ID: 8332N8C6UX
          EXPO_APPLE_TEAM_TYPE: INDIVIDUAL
        # 新ターゲットの署名プロファイル生成は対話モード限定のため、疑似TTYで
        # 確認プロンプトに既定値(Enter=Yes)を自動応答する。生成済みなら質問は出ない。
        # CI/GITHUB_ACTIONS変数があるとEAS CLIが強制的に非対話モードになるため外す
        run: yes "" | script -qec "env -u CI -u GITHUB_ACTIONS eas build --platform ios --profile production --auto-submit" /dev/null
