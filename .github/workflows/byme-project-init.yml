name: BYME 0. EAS Project Init (初回のみ)

# BYME のEASプロジェクトを作成し、projectId を app.json に書き込んで
# 開発ブランチにコミットする。初回に1度だけ実行すればよい。
# mainに置くが、ビルド対象は常に claude/app-dev-instructions-xpncjc ブランチ。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: byme
    steps:
      - name: Checkout (BYMEブランチを固定でチェックアウト)
        uses: actions/checkout@v4
        with:
          ref: claude/app-dev-instructions-xpncjc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create EAS project and write projectId
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas project:init --non-interactive --force

      - name: Commit projectId back to the byme branch
        run: |
          if git diff --quiet app.json; then
            echo "projectId already present; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "BYME: EAS projectId を登録 (project:init)"
          git push origin HEAD:claude/app-dev-instructions-xpncjc
