name: MH 1. EAS Build & TestFlight

# 手動実行: EASでMaster HealthのiOS本番ビルド → TestFlightへ自動提出。
# mainに置くが、ビルド対象は常に claude/master-health-ios-06hrvw ブランチのコード。
#
# iOS署名クレデンシャルは全自動で用意する(Apple IDログイン不要):
#   1. 過去に生成済みなら EAS環境変数(sensitive)から取得して再利用
#   2. なければ App Store Connect API(Adminキー)で配布証明書と
#      HealthKit対応のApp Store用プロビジョニングプロファイルを直接生成
#   3. credentials.json を組み立て、credentialsSource: local でビルド
# 注: eas env:* がCIでハングする事象があったため、全eas呼び出しに
#     timeout + stdin遮断を入れ、保存失敗は警告に留めてビルドを優先する。
on:
  workflow_dispatch:
    inputs:
      enc_creds:
        description: '暗号化クレデンシャル(内部用・省略可)'
        required: false
        default: ''
      submit_build_id:
        description: '既存ビルドをTestFlightへ提出する場合のビルドID(省略時は新規ビルド)'
        required: false
        default: ''

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: master-health
    steps:
      - name: Checkout (master-healthブランチを固定でチェックアウト)
        uses: actions/checkout@v4
        with:
          ref: claude/master-health-ios-06hrvw

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Resolve ASC credentials (注入 or EAS保管庫 or GitHub Secrets)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ENC_CREDS: ${{ inputs.enc_creds }}
          GH_ASC_API_KEY: ${{ secrets.MH_ASC_API_KEY }}
          GH_ASC_KEY_ID: ${{ secrets.MH_ASC_KEY_ID }}
          GH_ASC_ISSUER_ID: ${{ secrets.MH_ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }
          fetch_chunks() {
            # eas env:get の出力から "NAME_i=値" の行だけを厳密に抽出する。
            # (存在しない変数でもexit 0でメッセージが出る場合があり、
            #  素通しすると後段のbase64が壊れるため)
            local name="$1" out="" i=0 raw val
            while [ $i -lt 30 ]; do
              raw=$(timeout 120 eas env:get --variable-name "${name}_${i}" --variable-environment production --format short --non-interactive </dev/null 2>/dev/null || true)
              val=$(printf '%s' "$raw" | strip_ansi | tr -d '\r' | sed -n "s/^${name}_${i}=//p" | tr -d '\n')
              [ -z "$val" ] && break
              out="${out}${val}"
              i=$((i+1))
            done
            [ -n "$out" ] || return 1
            printf '%s' "$out"
          }
          b64_diag() {
            # base64文字列の健全性チェック(値そのものは出力しない)
            local label="$1" s="$2" bad
            bad=$(printf '%s' "$s" | tr -d 'A-Za-z0-9+/=' | wc -c)
            echo "[diag] ${label}: len=$(printf '%s' "$s" | wc -c) badchars=${bad}"
            if [ "$bad" -gt 0 ]; then
              printf '%s' "$s" | tr -d 'A-Za-z0-9+/=' | head -c 120 | od -c | head -6
            fi
          }
          store_chunks() {
            local name="$1" value="$2" i=0 part
            while [ -n "$value" ]; do
              part="${value:0:3000}"
              value="${value:3000}"
              timeout 120 eas env:create --environment production --name "${name}_${i}" --value "$part" --type string --visibility sensitive --scope project --force --non-interactive </dev/null >/dev/null
              i=$((i+1))
            done
          }

          if [ -n "${ENC_CREDS:-}" ]; then
            echo "[resolve] 注入されたクレデンシャルを復号"
            PRIV_B64=$(fetch_chunks MH_BOOT_PRIV) || { echo "::error::bootstrap秘密鍵がありません。先にMH 9を実行してください"; exit 1; }
            b64_diag "MH_BOOT_PRIV" "$PRIV_B64"
            printf '%s' "$PRIV_B64" | base64 -d > /tmp/boot_priv.pem
            openssl pkey -in /tmp/boot_priv.pem -noout 2>/dev/null && echo "[diag] bootstrap秘密鍵: 形式OK" || { echo "::error::bootstrap秘密鍵の復元に失敗(EAS env:getの出力が壊れている可能性)"; exit 1; }
            RSA_B64="${ENC_CREDS%%.*}"
            AES_B64="${ENC_CREDS#*.}"
            printf '%s' "$RSA_B64" | base64 -d > /tmp/wrapped_key.bin
            printf '%s' "$AES_B64" | base64 -d > /tmp/payload.enc
            openssl pkeyutl -decrypt -inkey /tmp/boot_priv.pem -in /tmp/wrapped_key.bin -out /tmp/aes_pass.bin -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256
            openssl enc -d -aes-256-cbc -pbkdf2 -pass file:/tmp/aes_pass.bin -in /tmp/payload.enc -out /tmp/payload.json
            ASC_KEY_ID=$(python3 -c "import json;print(json.load(open('/tmp/payload.json'))['key_id'])")
            ASC_ISSUER_ID=$(python3 -c "import json;print(json.load(open('/tmp/payload.json'))['issuer'])")
            python3 -c "import json,base64;open('asc_api_key.p8','wb').write(base64.b64decode(json.load(open('/tmp/payload.json'))['p8_b64']))"
            echo "[resolve] EAS保管庫に保存(次回以降は注入不要)"
            store_chunks MH_ASCP8 "$(python3 -c "import json;print(json.load(open('/tmp/payload.json'))['p8_b64'])")"
            store_chunks MH_ASCKID "$ASC_KEY_ID"
            store_chunks MH_ASCISS "$ASC_ISSUER_ID"
            rm -f /tmp/payload.json /tmp/aes_pass.bin
          elif P8_B64=$(fetch_chunks MH_ASCP8) && KID=$(fetch_chunks MH_ASCKID) && ISS=$(fetch_chunks MH_ASCISS); then
            echo "[resolve] EAS保管庫のクレデンシャルを使用"
            printf '%s' "$P8_B64" | base64 -d > asc_api_key.p8
            ASC_KEY_ID="$KID"
            ASC_ISSUER_ID="$ISS"
          else
            echo "[resolve] GitHub Secretsのクレデンシャルを使用(レガシー)"
            printf '%s\n' "$GH_ASC_API_KEY" > asc_api_key.p8
            ASC_KEY_ID="$GH_ASC_KEY_ID"
            ASC_ISSUER_ID="$GH_ASC_ISSUER_ID"
          fi
          echo "::add-mask::$ASC_KEY_ID"
          echo "::add-mask::$ASC_ISSUER_ID"
          echo "ASC_KEY_ID=$ASC_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$ASC_ISSUER_ID" >> "$GITHUB_ENV"
          echo "[resolve] key id prefix: ${ASC_KEY_ID:0:2} / issuer prefix: ${ASC_ISSUER_ID:0:4}"

      - name: Guard against missing projectId
        run: |
          if ! grep -q '"projectId"' app.json; then
            echo "::error::app.json に EAS projectId がありません。先に『MH 0. EAS Project Init』を実行してください。"
            exit 1
          fi

      - name: Fetch stored credentials from EAS env
        id: fetch
        timeout-minutes: 8
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ios-credentials
          echo "[canary] eas whoami:"
          timeout 90 eas whoami </dev/null || echo "::warning::eas whoami failed or hung (rc=$?)"

          # env:list はsensitive値を返さないことがあるため、実績のある
          # env:get ベースの取得(Resolveステップと同方式)を使う
          strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }
          getvar() {
            local name="$1" out="" i=0 raw val
            while [ $i -lt 30 ]; do
              raw=$(timeout 120 eas env:get --variable-name "${name}_${i}" --variable-environment production --format short --non-interactive </dev/null 2>/dev/null || true)
              val=$(printf '%s' "$raw" | strip_ansi | tr -d '\r' | sed -n "s/^${name}_${i}=//p" | tr -d '\n')
              [ -z "$val" ] && break
              out="${out}${val}"
              i=$((i+1))
            done
            printf '%s' "$out"
          }

          P12_B64=$(getvar MH_IOS_P12B64)
          P12_PW=$(getvar MH_IOS_P12PW)
          PROFILE_B64=$(getvar MH_IOS_PROFILE)
          echo "[fetch] p12=$(printf '%s' "$P12_B64" | wc -c)B pw=$(printf '%s' "$P12_PW" | wc -c)B profile=$(printf '%s' "$PROFILE_B64" | wc -c)B"

          if [ -n "$P12_B64" ] && [ -n "$P12_PW" ] && [ -n "$PROFILE_B64" ]; then
            echo "[fetch] 保存済みクレデンシャルを再利用します"
            echo "::add-mask::$P12_PW"
            printf '%s' "$P12_B64" | base64 -d > ios-credentials/dist.p12
            printf '%s' "$PROFILE_B64" | base64 -d > ios-credentials/profile.mobileprovision
            printf '{\n  "ios": {\n    "provisioningProfilePath": "ios-credentials/profile.mobileprovision",\n    "distributionCertificate": {\n      "path": "ios-credentials/dist.p12",\n      "password": "%s"\n    }\n  }\n}\n' "$P12_PW" > credentials.json
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "[fetch] 保存済みクレデンシャルなし → 新規生成へ"
            echo "have=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate credentials via App Store Connect API
        if: steps.fetch.outputs.have != 'true'
        timeout-minutes: 10
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ios-credentials
          echo "[gen] 鍵とCSRを生成"
          openssl genrsa -out ios-credentials/key.pem 2048
          openssl req -new -key ios-credentials/key.pem -out ios-credentials/cert.csr -subj "/CN=Master Health Distribution"

          echo "[gen] python依存を導入"
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests 2>/dev/null \
            || python3 -m pip install --quiet pyjwt cryptography requests

          cat > /tmp/mh_asc.py <<'PYEOF'
          import base64, json, os, re, sys, time
          import jwt, requests

          KEY_ID = os.environ['ASC_KEY_ID'].strip()
          ISSUER = os.environ['ASC_ISSUER_ID'].strip()
          BUNDLE = 'com.nash.masterhealth'

          key = open('asc_api_key.p8').read().replace('\r\n', '\n').strip() + '\n'
          _lines = key.strip().splitlines()
          print('diag: KEY_ID len=%d format_ok=%s prefix=%s' % (
              len(KEY_ID), bool(re.fullmatch(r'[A-Z0-9]{10}', KEY_ID)), KEY_ID[:2]), flush=True)
          print('diag: ISSUER len=%d uuid_format_ok=%s' % (
              len(ISSUER), bool(re.fullmatch(r'[0-9a-f-]{36}', ISSUER))), flush=True)
          print('diag: p8 lines=%d header_ok=%s footer_ok=%s' % (
              len(_lines),
              _lines[0] == '-----BEGIN PRIVATE KEY-----',
              _lines[-1] == '-----END PRIVATE KEY-----'), flush=True)
          now = int(time.time())
          B = 'https://api.appstoreconnect.apple.com'

          def make_headers(payload):
              t = jwt.encode(payload, key, algorithm='ES256', headers={'kid': KEY_ID})
              return {'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json'}

          # チームキー(iss)→ダメなら個人キー(sub)の順で認証を試す
          H = make_headers({'iss': ISSUER, 'iat': now - 30, 'exp': now + 900,
                            'aud': 'appstoreconnect-v1'})
          probe = requests.get(B + '/v1/bundleIds?limit=1', headers=H, timeout=60)
          print('auth probe (team key):', probe.status_code, flush=True)
          if probe.status_code == 401:
              H = make_headers({'sub': 'user', 'iat': now - 30, 'exp': now + 900,
                                'aud': 'appstoreconnect-v1'})
              probe = requests.get(B + '/v1/bundleIds?limit=1', headers=H, timeout=60)
              print('auth probe (individual key):', probe.status_code, flush=True)
          if probe.status_code == 401:
              print(probe.text[:600], flush=True)
              sys.exit('FATAL: AUTH_MISMATCH - Key ID / Issuer ID / p8 の組み合わせがAppleに認められません。同一キーの3点セットか確認が必要です。')

          def get(p):
              r = requests.get(B + p, headers=H, timeout=60)
              print('GET', p, '->', r.status_code, flush=True)
              if r.status_code >= 400:
                  print(r.text[:1200], flush=True)
              return r

          def post(p, d):
              r = requests.post(B + p, headers=H, data=json.dumps(d), timeout=60)
              print('POST', p, '->', r.status_code, flush=True)
              if r.status_code not in (200, 201):
                  print(r.text[:1200], flush=True)
              return r

          # 1) Bundle ID (なければ登録)
          r = get('/v1/bundleIds?filter[identifier]=' + BUNDLE + '&limit=20')
          r.raise_for_status()
          bid = None
          for d in r.json().get('data', []):
              if d['attributes']['identifier'] == BUNDLE:
                  bid = d['id']
          if bid is None:
              r = post('/v1/bundleIds', {'data': {'type': 'bundleIds', 'attributes': {
                  'identifier': BUNDLE, 'name': 'Master Health', 'platform': 'IOS'}}})
              if r.status_code not in (200, 201):
                  sys.exit('FATAL: bundle ID registration failed')
              bid = r.json()['data']['id']
          print('bundleId resource:', bid, flush=True)

          # 2) HealthKit capability (POST成功=有効。既に有効な場合のみGETで再確認。
          #    このrelationshipのGETはlimitパラメータ非対応なので付けない)
          r = post('/v1/bundleIdCapabilities', {'data': {
              'type': 'bundleIdCapabilities',
              'attributes': {'capabilityType': 'HEALTHKIT'},
              'relationships': {'bundleId': {'data': {'type': 'bundleIds', 'id': bid}}}}})
          cap_ok = r.status_code in (200, 201)
          if not cap_ok:
              r = get('/v1/bundleIds/' + bid + '/bundleIdCapabilities')
              caps = [d['attributes'].get('capabilityType') for d in r.json().get('data', [])]
              print('capabilities:', caps, flush=True)
              cap_ok = 'HEALTHKIT' in caps
          if not cap_ok:
              sys.exit('FATAL: HEALTHKIT capability could not be enabled')
          print('HEALTHKIT capability: OK', flush=True)

          # 3) 配布証明書 (CSRから生成)
          csr = open('ios-credentials/cert.csr').read()
          r = post('/v1/certificates', {'data': {'type': 'certificates', 'attributes': {
              'certificateType': 'DISTRIBUTION', 'csrContent': csr}}})
          if r.status_code not in (200, 201):
              r2 = get('/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=10')
              print('existing DISTRIBUTION certs:',
                    [(d['id'], d['attributes'].get('displayName')) for d in r2.json().get('data', [])], flush=True)
              sys.exit('FATAL: certificate creation failed (上のレスポンス参照。枚数上限の可能性)')
          cert = r.json()['data']
          open('ios-credentials/cert.der', 'wb').write(
              base64.b64decode(cert['attributes']['certificateContent']))
          print('certificate created:', cert['id'], cert['attributes'].get('displayName'), flush=True)

          # 4) App Store用プロビジョニングプロファイル
          r = post('/v1/profiles', {'data': {
              'type': 'profiles',
              'attributes': {'name': 'Master Health AppStore ' + str(now),
                             'profileType': 'IOS_APP_STORE'},
              'relationships': {
                  'bundleId': {'data': {'type': 'bundleIds', 'id': bid}},
                  'certificates': {'data': [{'type': 'certificates', 'id': cert['id']}]},
              }}})
          if r.status_code not in (200, 201):
              sys.exit('FATAL: profile creation failed')
          prof = r.json()['data']
          open('ios-credentials/profile.mobileprovision', 'wb').write(
              base64.b64decode(prof['attributes']['profileContent']))
          print('profile created:', prof['id'], prof['attributes']['name'], flush=True)
          print('RESULT: OK', flush=True)
          PYEOF

          echo "[gen] App Store Connect APIで証明書・プロファイルを生成"
          python3 /tmp/mh_asc.py

          echo "[gen] p12を作成"
          openssl x509 -inform der -in ios-credentials/cert.der -out ios-credentials/cert.pem
          P12_PW=$(openssl rand -hex 16)
          echo "::add-mask::$P12_PW"
          openssl pkcs12 -export -legacy -inkey ios-credentials/key.pem -in ios-credentials/cert.pem \
            -out ios-credentials/dist.p12 -passout "pass:${P12_PW}" 2>/dev/null \
            || openssl pkcs12 -export -inkey ios-credentials/key.pem -in ios-credentials/cert.pem \
                 -out ios-credentials/dist.p12 -passout "pass:${P12_PW}"

          printf '{\n  "ios": {\n    "provisioningProfilePath": "ios-credentials/profile.mobileprovision",\n    "distributionCertificate": {\n      "path": "ios-credentials/dist.p12",\n      "password": "%s"\n    }\n  }\n}\n' "$P12_PW" > credentials.json
          echo "[gen] credentials.json ready"

          echo "[store] EAS環境変数へ保存(失敗してもビルドは続行)"
          store_chunks() {
            local name="$1" value="$2" i=0 part
            while [ -n "$value" ]; do
              part="${value:0:3000}"
              value="${value:3000}"
              if ! timeout 120 eas env:create --environment production --name "${name}_${i}" --value "$part" --type string --visibility sensitive --scope project --force --non-interactive </dev/null >/dev/null 2>&1; then
                echo "::warning::env:create ${name}_${i} が失敗/タイムアウト。保存を中断(次回は再生成になります)"
                return 0
              fi
              i=$((i+1))
            done
            echo "[store] ${name}: ${i} chunk(s)"
          }
          P12_B64=$(base64 -w0 ios-credentials/dist.p12)
          PROFILE_B64=$(base64 -w0 ios-credentials/profile.mobileprovision)
          store_chunks MH_IOS_P12B64 "$P12_B64"
          store_chunks MH_IOS_P12PW "$P12_PW"
          store_chunks MH_IOS_PROFILE "$PROFILE_B64"

      - name: Detect Apple Team ID from certificate
        run: |
          set -euo pipefail
          PW=$(python3 -c "import json;print(json.load(open('credentials.json'))['ios']['distributionCertificate']['password'])")
          SUBJ=$(openssl pkcs12 -in ios-credentials/dist.p12 -passin "pass:${PW}" -nokeys -legacy 2>/dev/null | openssl x509 -noout -subject || true)
          echo "cert subject: $SUBJ"
          TEAM=$(printf '%s' "$SUBJ" | sed -n 's/.*OU *= *\([A-Z0-9]\{10\}\).*/\1/p')
          if [ -n "$TEAM" ]; then
            echo "$TEAM" > /tmp/mh_team_id
            echo "Apple Team ID (証明書から自動検出): $TEAM"
          else
            echo "::warning::チームIDを検出できず、既定値(68995AYXDQ)を使用します"
          fi

      - name: Resolve ascAppId (App Store Connectのアプリレコード)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests 2>/dev/null \
            || python3 -m pip install --quiet pyjwt cryptography requests
          cat > /tmp/mh_ascapp.py <<'PYEOF'
          import os, time
          import jwt, requests

          KEY_ID = os.environ['ASC_KEY_ID'].strip()
          ISSUER = os.environ['ASC_ISSUER_ID'].strip()
          BUNDLE = 'com.nash.masterhealth'
          B = 'https://api.appstoreconnect.apple.com'
          key = open('asc_api_key.p8').read()

          now = int(time.time())
          tok = jwt.encode({'iss': ISSUER, 'exp': now + 900, 'aud': 'appstoreconnect-v1', 'iat': now},
                           key, algorithm='ES256', headers={'kid': KEY_ID, 'typ': 'JWT'})
          H = {'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json'}

          def find_app():
              r = requests.get(B + '/v1/apps?filter[bundleId]=' + BUNDLE, headers=H, timeout=60)
              print('GET /v1/apps ->', r.status_code, flush=True)
              if r.status_code != 200:
                  print(r.text[:400], flush=True)
                  return None
              data = r.json().get('data', [])
              return data[0]['id'] if data else None

          appid = find_app()
          if not appid:
              # 公式APIではアプリレコード作成は基本的に不可だが、ダメ元で試す
              body = {'data': {'type': 'apps', 'attributes': {
                  'name': 'Master Health', 'primaryLocale': 'ja',
                  'sku': 'masterhealth', 'bundleId': BUNDLE}}}
              r = requests.post(B + '/v1/apps', headers=H, json=body, timeout=60)
              print('POST /v1/apps ->', r.status_code, r.text[:300], flush=True)
              appid = find_app()
          if appid:
              print('ascAppId:', appid, flush=True)
              open('/tmp/mh_asc_app_id', 'w').write(str(appid))
          else:
              print('NO_APP_RECORD: App Store Connectにアプリレコードがありません', flush=True)
          PYEOF
          python3 /tmp/mh_ascapp.py
          if [ -f /tmp/mh_asc_app_id ]; then
            # 非対話のeas submitはASC APIキーをeas.jsonのsubmitプロファイルから読む
            python3 -c "import json,os;d=json.load(open('eas.json'));i=d.setdefault('submit',{}).setdefault('production',{}).setdefault('ios',{});i['ascAppId']=open('/tmp/mh_asc_app_id').read().strip();i['ascApiKeyPath']='./asc_api_key.p8';i['ascApiKeyId']=os.environ['ASC_KEY_ID'];i['ascApiKeyIssuerId']=os.environ['ASC_ISSUER_ID'];json.dump(d,open('eas.json','w'),indent=2)"
            echo "eas.json に ascAppId とASC APIキー設定を書き込みました"
          else
            echo "::warning::アプリレコード未作成のため、提出はスキップされます(ビルドのみ)"
          fi

      - name: Build on EAS and auto-submit to TestFlight
        timeout-minutes: 15
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SUBMIT_BUILD_ID: ${{ inputs.submit_build_id }}
          EXPO_ASC_API_KEY_PATH: ./asc_api_key.p8
          EXPO_APPLE_TEAM_TYPE: ${{ vars.MH_APPLE_TEAM_TYPE || 'INDIVIDUAL' }}
          EXPO_PUBLIC_ANTHROPIC_API_KEY: ${{ secrets.MH_ANTHROPIC_API_KEY }}
          EAS_SKIP_AUTO_FINGERPRINT: "1"
        run: |
          set -euo pipefail
          TEAM_ID=$(cat /tmp/mh_team_id 2>/dev/null || echo 68995AYXDQ)
          echo "使用するApple Team ID: $TEAM_ID"
          export EXPO_APPLE_TEAM_ID="$TEAM_ID"
          export EXPO_ASC_KEY_ID="$ASC_KEY_ID"
          export EXPO_ASC_ISSUER_ID="$ASC_ISSUER_ID"
          if [ -n "${SUBMIT_BUILD_ID:-}" ]; then
            [ -f /tmp/mh_asc_app_id ] || { echo "::error::ascAppIdが解決できないため提出できません"; exit 1; }
            echo "既存ビルド ${SUBMIT_BUILD_ID} をTestFlightへ提出します(完了まで待機)"
            eas submit --platform ios --profile production --id "$SUBMIT_BUILD_ID" --non-interactive --wait </dev/null
          elif [ -f /tmp/mh_asc_app_id ]; then
            eas build --platform ios --profile production --auto-submit --non-interactive --no-wait </dev/null
          else
            echo "アプリレコードが無いため、提出なしでビルドのみ実行します"
            eas build --platform ios --profile production --non-interactive --no-wait </dev/null
          fi
